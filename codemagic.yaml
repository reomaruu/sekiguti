workflows:
  ios-simulator-unsigned:
    name: iOS Simulator unsigned build
    max_build_duration: 120
    instance_type: mac_mini_m2
    environment:
      xcode: latest
      node: lts
      cocoapods: default
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
          include: true
          source: true
    scripts:
      - name: Show tool versions
        script: |
          node --version
          npm --version
          pod --version
          xcodebuild -version
      - name: Install npm dependencies
        script: |
          npm install
      - name: Generate Capacitor iOS project
        script: |
          npx cap add ios
          npx cap sync ios
      - name: Install CocoaPods dependencies
        script: |
          cd ios/App
          pod install
      - name: Build unsigned .app for iOS Simulator
        script: |
          mkdir -p /tmp/xcodebuild_logs
          set -o pipefail
          xcodebuild build \
            -workspace ios/App/App.xcworkspace \
            -scheme App \
            -sdk iphonesimulator \
            -destination 'generic/platform=iOS Simulator' \
            -configuration Debug \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            | tee /tmp/xcodebuild_logs/xcodebuild.log
    artifacts:
      - /tmp/xcodebuild_logs/*.log
      - $HOME/Library/Developer/Xcode/DerivedData/**/Build/**/*.app
      - $HOME/Library/Developer/Xcode/DerivedData/**/Build/**/*.dSYM
